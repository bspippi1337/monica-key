name: Cloudflare Relay and Android APKs

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Worker tooling
        run: npm install --prefix cloudflare --no-audit --no-fund

      - name: Validate Cloudflare Worker bundle
        run: npm run check --prefix cloudflare

      - name: Require Cloudflare credentials
        if: github.event_name != 'pull_request'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || {
            echo "Missing GitHub secret CLOUDFLARE_ACCOUNT_ID"
            exit 1
          }
          test -n "$CLOUDFLARE_API_TOKEN" || {
            echo "Missing GitHub secret CLOUDFLARE_API_TOKEN"
            exit 1
          }

      - name: Deploy free Cloudflare Durable Object relay
        if: github.event_name != 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloudflare
          command: deploy

      - name: Resolve and verify relay URL
        if: github.event_name != 'pull_request'
        id: relay
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          response="$(curl -fsS \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/workers/subdomain")"
          subdomain="$(jq -r '.result.subdomain // empty' <<<"$response")"
          test -n "$subdomain" || {
            echo "$response"
            echo "Could not resolve workers.dev subdomain"
            exit 1
          }

          relay_url="https://monica-key-relay.${subdomain}.workers.dev"
          echo "url=$relay_url" >> "$GITHUB_OUTPUT"
          echo "Relay: $relay_url"

          for attempt in $(seq 1 30); do
            if curl -fsS --max-time 10 "$relay_url/healthz" | jq -e '.ok == true' >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Relay failed health check"
          exit 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build Pippi Key and Monica Key
        env:
          MONICA_RELAY_URL: ${{ steps.relay.outputs.url || 'https://relay-validation.invalid' }}
        run: |
          python3 tools/prepare-source.py
          gradle --no-daemon --console=plain --stacktrace \
            :app:assemblePippiDebug \
            :app:assembleMonicaDebug

      - name: Prepare release files
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/pippi/debug/app-pippi-debug.apk \
            dist/PippiKey-debug.apk
          cp app/build/outputs/apk/monica/debug/app-monica-debug.apk \
            dist/MonicaKey-debug.apk
          printf '%s\n' '${{ steps.relay.outputs.url }}' > dist/RELAY_URL.txt
          sha256sum \
            dist/PippiKey-debug.apk \
            dist/MonicaKey-debug.apk \
            | tee dist/SHA256SUMS.txt

      - name: Publish rolling release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest dist/* --clobber
            gh release edit latest \
              --title "Latest Monica Key build" \
              --notes "Cloudflare relay: ${{ steps.relay.outputs.url }}\n\nCommit: $GITHUB_SHA"
          else
            gh release create latest dist/* \
              --target "$GITHUB_SHA" \
              --title "Latest Monica Key build" \
              --notes "Cloudflare relay: ${{ steps.relay.outputs.url }}\n\nCommit: $GITHUB_SHA" \
              --prerelease
          fi

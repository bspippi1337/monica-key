name: Build Pippi Key and Monica Key

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache-dependency-path: server/go.mod

      - name: Build both APKs
        run: |
          gradle --no-daemon --console=plain --stacktrace \
            :app:assemblePippiDebug \
            :app:assembleMonicaDebug

      - name: Test and build relay
        working-directory: server
        run: |
          gofmt -w .
          go mod tidy
          go test ./...
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags="-s -w" \
            -o monica-key-relay \
            .

      - name: Prepare release files
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/pippi/debug/app-pippi-debug.apk \
            dist/PippiKey-debug.apk
          cp app/build/outputs/apk/monica/debug/app-monica-debug.apk \
            dist/MonicaKey-debug.apk
          cp server/monica-key-relay \
            dist/MonicaKey-relay-linux-amd64
          sha256sum \
            dist/PippiKey-debug.apk \
            dist/MonicaKey-debug.apk \
            dist/MonicaKey-relay-linux-amd64 \
            | tee dist/SHA256SUMS.txt

      - name: Publish rolling release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest dist/* --clobber
            gh release edit latest \
              --title "Latest Monica Key build" \
              --notes "Automatisk bygg fra commit $GITHUB_SHA."
          else
            gh release create latest dist/* \
              --target "$GITHUB_SHA" \
              --title "Latest Monica Key build" \
              --notes "Automatisk bygg fra commit $GITHUB_SHA." \
              --prerelease
          fi

name: Build Monica Key Showcase APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "tools/prepare-source.py"
      - "tools/prepare-showcase.py"
      - ".github/workflows/showcase.yml"
      - "*.gradle.kts"
      - "gradle.properties"
  pull_request:
    paths:
      - "app/**"
      - "tools/prepare-source.py"
      - "tools/prepare-showcase.py"
      - ".github/workflows/showcase.yml"
      - "*.gradle.kts"
      - "gradle.properties"

permissions:
  contents: write

jobs:
  showcase:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Prepare polished offline showcase
        env:
          MONICA_RELAY_URL: https://offline-showcase.invalid
        run: |
          python3 tools/prepare-source.py
          python3 tools/prepare-showcase.py

      - name: Build showcase APK
        run: |
          gradle --no-daemon --console=plain --stacktrace \
            :app:assembleShowcaseDebug

      - name: Verify and package
        run: |
          apk="app/build/outputs/apk/showcase/debug/app-showcase-debug.apk"
          test -s "$apk"
          mkdir -p dist
          cp "$apk" dist/MonicaKey-Showcase.apk
          sha256sum dist/MonicaKey-Showcase.apk | tee dist/SHA256SUMS.txt

      - name: Publish showcase release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view showcase >/dev/null 2>&1; then
            gh release upload showcase dist/* --clobber
            gh release edit showcase \
              --title "Monica Key Showcase" \
              --notes "Offline demo-APK med romantisk GUI og lokale demodata. Ingen konto, server, GPS eller Cloudflare kreves. Commit: $GITHUB_SHA"
          else
            gh release create showcase dist/* \
              --target "$GITHUB_SHA" \
              --title "Monica Key Showcase" \
              --notes "Offline demo-APK med romantisk GUI og lokale demodata. Ingen konto, server, GPS eller Cloudflare kreves. Commit: $GITHUB_SHA" \
              --prerelease
          fi

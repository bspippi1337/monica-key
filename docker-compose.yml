services:
  relay:
    build: ./server
    restart: unless-stopped
    environment:
      MONICA_KEY_ADDR: :4242
      MONICA_KEY_DATA: /data
    volumes:
      - ./data:/data
    expose:
      - "4242"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      MONICA_KEY_DOMAIN: ${MONICA_KEY_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - relay

volumes:
  caddy_data:
  caddy_config:
